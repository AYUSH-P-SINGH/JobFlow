global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jobflow-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:5000']

  - job_name: 'jobflow-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:5001']
