version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobflow-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: jobflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobflow-redis-prod
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jobflow-jaeger
    restart: always
    ports:
      - '16686:16686' # UI
      - '4318:4318'   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-api-prod
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=super_secret_jwt_key_jobflow_production
      - JWT_EXPIRES_IN=1h
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/jobflow?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - ENABLE_TRACING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_SERVICE_NAME=jobflow-api
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-worker-prod
    restart: always
    command: ['node', 'dist/worker.js']
    environment:
      - WORKER_PORT=5001
      - NODE_ENV=production
      - JWT_SECRET=super_secret_jwt_key_jobflow_production
      - JWT_EXPIRES_IN=1h
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/jobflow?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - ENABLE_TRACING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_SERVICE_NAME=jobflow-worker
    ports:
      - '5001:5001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:5001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: jobflow-prometheus
    restart: always
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    depends_on:
      - api

  loki:
    image: grafana/loki:2.9.2
    container_name: jobflow-loki
    restart: always
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.2
    container_name: jobflow-promtail
    restart: always
    volumes:
      - ./docker/promtail/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: jobflow-grafana
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobflow-frontend-prod
    restart: always
    ports:
      - '80:80'
    depends_on:
      - api


volumes:
  postgres_data_prod:
  redis_data_prod:
  prometheus_data:
  grafana_data:
