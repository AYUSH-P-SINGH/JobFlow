apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobflow.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "jobflow.name" . }}-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ include "jobflow.name" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "jobflow.name" . }}-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "jobflow.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobflow.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobflow.fullname" . }}-secrets
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobflow.fullname" . }}-secrets
                  key: REDIS_PASSWORD
            - name: OTEL_SERVICE_NAME
              value: "{{ include "jobflow.name" . }}-api"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /startup
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
