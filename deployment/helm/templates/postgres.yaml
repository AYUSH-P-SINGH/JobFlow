apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "jobflow.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ include "jobflow.fullname" . }}-postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "jobflow.name" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "jobflow.name" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "{{ .Values.postgres.user }}"
            - name: POSTGRES_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: POSTGRES_DB
              value: "{{ .Values.postgres.database }}"
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-db
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-db
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobflow.fullname" . }}-postgres-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "jobflow.name" . }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
