apiVersion: v1
kind: ConfigMap
metadata:
  name: jobflow-config
  namespace: jobflow
data:
  PORT: "5000"
  WORKER_PORT: "5001"
  NODE_ENV: "production"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: "1h"
  ENABLE_TRACING: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-service:4318/v1/traces"
