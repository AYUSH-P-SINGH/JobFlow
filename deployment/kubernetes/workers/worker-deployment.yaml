apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: jobflow
  labels:
    app: worker
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: jobflow-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/worker.js"]
          ports:
            - containerPort: 5001
              name: health-port
          envFrom:
            - configMapRef:
                name: jobflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: jobflow-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jobflow-secrets
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobflow-secrets
                  key: REDIS_PASSWORD
            - name: OTEL_SERVICE_NAME
              value: "jobflow-worker"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /startup
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
